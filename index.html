<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./style.css">
  <title>Image Preview</title>
</head>
<body>
  
  <div class="container">
    <div class="content">
      <h1>Image Preview</h1>
      <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Blanditiis, est. Lorem ipsum dolor sit amet.</p>
    </div>
    <div class="box">
      <figure class="image-box">
        <img class="image">
      </figure>
      <div class="box-content">
        <span>nama file : <b class="name">...</b></span>
        <span>type : <b class="type">...</b></span>
      </div>
      <div class="button-wrapper">
        <input type="file" id="upload-button" accept="image/*">
        <label for="upload-button">Choose File</label>
      </div>
    </div>
  </div>
  
  <script src="./script.js"></script>
</body>
</html>
